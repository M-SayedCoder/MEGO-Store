<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - MEGO Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/cart.css">
  <link rel="stylesheet" href="assets/css/features.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <nav aria-label="breadcrumb" class="breadcrumb-section">
    <div class="container"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Shopping Cart</li></ol></div>
  </nav>
  <section class="cart-section">
    <div class="container">
      <h2 class="section-title mb-4">Shopping <span>Cart</span> <small style="font-size:1rem;font-family:var(--font-body);color:var(--text-muted);font-weight:400">(<span id="itemCount">0</span> items)</small></h2>
      <div class="row g-4">
        <div class="col-lg-8" id="cartMain">
          <div class="cart-table">
            <div class="cart-table-head">
              <div>Product</div><div>Price</div><div>Quantity</div><div>Subtotal</div><div></div>
            </div>
            <div id="cartItems"></div>
            <div class="cart-footer">
              <div class="coupon-wrap">
                <input type="text" class="coupon-input" id="couponInput" placeholder="Coupon code (try MEGO30)">
                <button class="btn-outline-custom py-2 px-3" style="font-size:0.85rem" onclick="CartPage.applyCoupon()">Apply</button>
              </div>
              <div class="d-flex gap-2">
                <a href="products.html" class="btn-outline-custom py-2 px-3" style="font-size:0.82rem"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
                <button class="btn-dark-custom py-2 px-3" style="font-size:0.82rem" onclick="CartPage.clearCart()"><i class="fas fa-trash"></i> Clear Cart</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="cart-summary">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row"><span class="summary-label">Subtotal</span><span class="summary-value" id="summarySubtotal">$0.00</span></div>
            <div class="summary-row" id="discountRow" style="display:none"><span class="summary-label summary-discount">Discount</span><span class="summary-value summary-discount" id="summaryDiscount">-$0.00</span></div>
            <div class="summary-row"><span class="summary-label">Shipping</span><span class="summary-value" id="summaryShipping">$0.00</span></div>
            <div class="summary-total"><span>Total</span><span class="price" id="summaryTotal">$0.00</span></div>
            <a href="checkout.html" class="btn-primary-custom w-100 mt-4 justify-content-center"><i class="fas fa-lock"></i> Secure Checkout</a>
            <div class="mt-3 text-center" style="font-size:0.75rem;color:var(--text-muted)"><i class="fas fa-shield-alt me-1" style="color:var(--primary)"></i>Secure & Encrypted Payment</div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <div id="footer-placeholder"></div>
  <div class="toast-container-custom"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/cart.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();
  </script>
  <script src="assets/js/features.js"></script>
</body>
</html>
