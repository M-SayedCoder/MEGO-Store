<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist - MEGO Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/wishlist.css">
  <link rel="stylesheet" href="assets/css/features.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <nav aria-label="breadcrumb" class="breadcrumb-section">
    <div class="container"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Wishlist</li></ol></div>
  </nav>
  <section class="wishlist-section">
    <div class="container">
      <div class="wishlist-header-bar">
        <h2 class="section-title">My <span>Wishlist</span> <small style="font-family:var(--font-body);font-size:1rem;font-weight:400;color:var(--text-muted)">(<span id="wishCount">0</span> items)</small></h2>
        <button class="btn-outline-custom py-2 px-3" style="font-size:0.82rem" onclick="WishlistPage.clearAll()"><i class="fas fa-trash"></i> Clear All</button>
      </div>
      <div class="row g-3" id="wishlistGrid"></div>
    </div>
  </section>
  <div id="footer-placeholder"></div>
  <div class="toast-container-custom"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/wishlist.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();
  </script>
  <script src="assets/js/features.js"></script>
</body>
</html>
