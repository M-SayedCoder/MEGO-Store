<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - MEGO Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/products.css">
  <link rel="stylesheet" href="assets/css/features.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <nav aria-label="breadcrumb" class="breadcrumb-section">
    <div class="container"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="index.html">Home</a></li><li class="breadcrumb-item active">Products</li></ol></div>
  </nav>

  <div class="products-page">
    <div class="container">
      <div class="row g-4">
        <!-- SIDEBAR -->
        <div class="col-lg-3">
          <div class="filters-sidebar" id="filtersSidebar">
            <button class="filter-close-btn d-lg-none" id="filterCloseBtn"><i class="fas fa-times"></i></button>
            <div class="filter-title">
              <span><i class="fas fa-sliders-h me-2" style="color:var(--primary)"></i>Filters</span>
              <button id="clearAllFilters" style="font-size:0.75rem;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600">Clear All</button>
            </div>

            <div class="filter-section">
              <div class="filter-section-title">Category</div>
              <label class="filter-check"><input type="checkbox" data-cat-filter value="Men"><span class="filter-check-label">Men</span><span class="filter-check-count" id="count-men">0</span></label>
              <label class="filter-check"><input type="checkbox" data-cat-filter value="Women"><span class="filter-check-label">Women</span><span class="filter-check-count" id="count-women">0</span></label>
              <label class="filter-check"><input type="checkbox" data-cat-filter value="Accessories"><span class="filter-check-label">Accessories</span><span class="filter-check-count" id="count-accessories">0</span></label>
              <label class="filter-check"><input type="checkbox" data-cat-filter value="Footwear"><span class="filter-check-label">Footwear</span><span class="filter-check-count" id="count-footwear">0</span></label>
              <label class="filter-check"><input type="checkbox" data-cat-filter value="Jewelry"><span class="filter-check-label">Jewelry</span><span class="filter-check-count" id="count-jewelry">0</span></label>
            </div>

            <div class="filter-section">
              <div class="filter-section-title">Price Range</div>
              <div class="price-range-wrap">
                <input type="range" class="price-range-input" id="priceRange" min="0" max="500" value="500">
                <div class="price-display"><span>$0</span><span id="priceMax">$500</span></div>
              </div>
            </div>

            <div class="filter-section">
              <div class="filter-section-title">Rating</div>
              <div class="rating-filter">
                <div class="rating-option" data-rating="4.5"><span class="rating-stars-filter">★★★★★</span><span class="rating-label">4.5 & above</span></div>
                <div class="rating-option" data-rating="4"><span class="rating-stars-filter">★★★★☆</span><span class="rating-label">4.0 & above</span></div>
                <div class="rating-option" data-rating="3"><span class="rating-stars-filter">★★★☆☆</span><span class="rating-label">3.0 & above</span></div>
              </div>
            </div>

            <div class="filter-section">
              <div class="filter-section-title">Special</div>
              <label class="filter-check"><input type="checkbox" id="filterSale"><span class="filter-check-label">On Sale Only</span></label>
            </div>
          </div>
        </div>

        <!-- MAIN -->
        <div class="col-lg-9">
          <div class="sort-bar">
            <div class="results-count"><strong id="resultsCount">0</strong> Products Found</div>
            <div class="sort-controls">
              <button class="mobile-filter-btn btn-outline-custom py-2 px-3" id="mobileFilterBtn" style="font-size:0.82rem"><i class="fas fa-filter"></i> Filter</button>
              <select class="sort-select" id="sortSelect">
                <option value="featured">Featured</option>
                <option value="newest">Newest</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="rating">Best Rating</option>
                <option value="name">Name A-Z</option>
              </select>
              <div class="view-toggle">
                <button class="view-btn active" data-view="grid"><i class="fas fa-th"></i></button>
                <button class="view-btn" data-view="list"><i class="fas fa-list"></i></button>
              </div>
            </div>
          </div>
          <div class="active-filters" id="activeTags"></div>
          <div id="productsGrid" class="row g-3"></div>
          <div class="pagination-custom" id="pagination"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <div class="toast-container-custom"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/products.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('Products');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();
  </script>
  <script src="assets/js/features.js"></script>
</body>
</html>
