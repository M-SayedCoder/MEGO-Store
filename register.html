<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MEGO Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/features.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">MEGO<span>.</span></div>
          <div class="auth-subtitle">Create your free account today</div>
        </div>
        <div class="auth-body">
          <div class="auth-tabs">
            <button class="auth-tab" onclick="window.location='login.html'">Sign In</button>
            <button class="auth-tab active">Create Account</button>
          </div>
          <button class="social-auth-btn"><i class="fab fa-google" style="color:#ea4335"></i>Continue with Google</button>
          <div class="auth-divider"><span>or register with email</span></div>
          <form id="registerForm">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <div class="form-group-custom"><label class="form-label-custom">First Name</label><input class="form-control-custom" placeholder="John" required></div>
              <div class="form-group-custom"><label class="form-label-custom">Last Name</label><input class="form-control-custom" placeholder="Doe" required></div>
            </div>
            <div class="form-group-custom"><label class="form-label-custom">Email</label><div class="input-icon-wrap"><i class="fas fa-envelope inp-icon"></i><input type="email" class="form-control-custom" placeholder="your@email.com" required></div></div>
            <div class="form-group-custom"><label class="form-label-custom">Password</label><div class="input-icon-wrap" style="position:relative"><i class="fas fa-lock inp-icon"></i><input id="regPass" type="password" class="form-control-custom" placeholder="Min. 8 characters" required><button type="button" class="password-toggle"><i class="fas fa-eye"></i></button></div></div>
            <div class="form-group-custom"><label class="form-label-custom">Confirm Password</label><div class="input-icon-wrap" style="position:relative"><i class="fas fa-lock inp-icon"></i><input id="regConfirm" type="password" class="form-control-custom" placeholder="Repeat password" required><button type="button" class="password-toggle"><i class="fas fa-eye"></i></button></div></div>
            <div class="form-group-custom"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.82rem"><input type="checkbox" required style="accent-color:var(--primary)"> I agree to the <a href="#" style="color:var(--primary)">Terms & Conditions</a></label></div>
            <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="padding:13px"><i class="fas fa-user-plus"></i> Create Account</button>
          </form>
          <p style="text-align:center;font-size:0.82rem;color:var(--text-muted);margin-top:16px">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600">Sign In</a></p>
        </div>
      </div>
    </div>
  </section>
  <div class="toast-container-custom"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('');
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const p = document.getElementById('regPass').value;
      const c = document.getElementById('regConfirm').value;
      if (p !== c) { Toast.show('Passwords do not match', 'error'); return; }
      Toast.show('Account created! Welcome to MEGO 🎉', 'success');
      setTimeout(() => window.location = 'profile.html', 1200);
    });
  </script>
  <script src="assets/js/features.js"></script>
</body>
</html>
