<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MEGO Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/features.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">MEGO<span>.</span></div>
          <div class="auth-subtitle">Your premium fashion destination</div>
        </div>
        <div class="auth-body">
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Sign In</button>
            <button class="auth-tab" data-tab="register">Create Account</button>
          </div>
          <!-- LOGIN -->
          <div id="loginSection">
            <button class="social-auth-btn"><i class="fab fa-google" style="color:#ea4335"></i>Continue with Google</button>
            <button class="social-auth-btn"><i class="fab fa-facebook-f" style="color:#1877f2"></i>Continue with Facebook</button>
            <div class="auth-divider"><span>or sign in with email</span></div>
            <form id="loginForm">
              <div class="form-group-custom">
                <label class="form-label-custom">Email Address</label>
                <div class="input-icon-wrap"><i class="fas fa-envelope inp-icon"></i><input id="loginEmail" type="email" class="form-control-custom" placeholder="your@email.com"></div>
              </div>
              <div class="form-group-custom">
                <label class="form-label-custom">Password</label>
                <div class="input-icon-wrap" style="position:relative"><i class="fas fa-lock inp-icon"></i><input id="loginPass" type="password" class="form-control-custom" placeholder="••••••••"><button type="button" class="password-toggle"><i class="fas fa-eye"></i></button></div>
              </div>
              <a href="#" class="forgot-link">Forgot password?</a>
              <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="padding:13px"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            </form>
          </div>
          <!-- REGISTER -->
          <div id="registerSection" style="display:none">
            <form id="registerForm">
              <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <div class="form-group-custom"><label class="form-label-custom">First Name</label><input id="regFirst" class="form-control-custom" placeholder="John"></div>
                <div class="form-group-custom"><label class="form-label-custom">Last Name</label><input id="regLast" class="form-control-custom" placeholder="Doe"></div>
              </div>
              <div class="form-group-custom"><label class="form-label-custom">Email</label><div class="input-icon-wrap"><i class="fas fa-envelope inp-icon"></i><input id="regEmail" type="email" class="form-control-custom" placeholder="your@email.com"></div></div>
              <div class="form-group-custom"><label class="form-label-custom">Password</label><div class="input-icon-wrap" style="position:relative"><i class="fas fa-lock inp-icon"></i><input id="regPass" type="password" class="form-control-custom" placeholder="Min. 8 characters"><button type="button" class="password-toggle"><i class="fas fa-eye"></i></button></div></div>
              <div class="form-group-custom"><label class="form-label-custom">Confirm Password</label><div class="input-icon-wrap" style="position:relative"><i class="fas fa-lock inp-icon"></i><input id="regConfirm" type="password" class="form-control-custom" placeholder="Repeat password"><button type="button" class="password-toggle"><i class="fas fa-eye"></i></button></div></div>
              <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="padding:13px"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
  <div class="toast-container-custom"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>document.getElementById('navbar-placeholder').innerHTML = renderNavbar('');</script>
  <script src="assets/js/features.js"></script>
</body>
</html>
